deptrac:
    paths:
        - ./src
    layers:
        -   name: Bundle
            collectors:
                -   type: directory
                    value: ./src/bundle/.*
        -   name: Library
            collectors:
                -   type: directory
                    value: ./src/lib/.*
    ruleset:
        Bundle:
            - Bundle
            - Library
        Library:
            - Library
